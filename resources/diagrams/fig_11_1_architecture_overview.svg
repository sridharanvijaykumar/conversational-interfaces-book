<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="440" viewBox="0 0 800 440" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>Figure 11.1 – Chatbot System Architecture</title>
  <rect width="800" height="440" fill="#f8f9fa" rx="8"/>
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Figure 11.1 – Chatbot System Architecture Overview</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
    <marker id="arr2r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Client Layer -->
  <rect x="20" y="50" width="140" height="280" rx="8" fill="#D5E8F3" stroke="#AED6F1" stroke-width="1.5"/>
  <text x="90" y="72" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B4F72">Client Layer</text>

  <rect x="35" y="85" width="110" height="40" rx="6" fill="#1B4F72"/>
  <text x="90" y="110" text-anchor="middle" font-size="11" fill="white">Web Chat</text>

  <rect x="35" y="135" width="110" height="40" rx="6" fill="#1F618D"/>
  <text x="90" y="160" text-anchor="middle" font-size="11" fill="white">Mobile App</text>

  <rect x="35" y="185" width="110" height="40" rx="6" fill="#2471A3"/>
  <text x="90" y="210" text-anchor="middle" font-size="11" fill="white">WhatsApp</text>

  <rect x="35" y="235" width="110" height="40" rx="6" fill="#2980B9"/>
  <text x="90" y="260" text-anchor="middle" font-size="11" fill="white">Voice / IVR</text>

  <!-- Arrow Client → API Gateway -->
  <line x1="160" y1="190" x2="205" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="182" y="182" text-anchor="middle" font-size="9" fill="#444">HTTPS</text>

  <!-- API Gateway -->
  <rect x="210" y="155" width="120" height="70" rx="8" fill="#117A65" stroke="#0E6655" stroke-width="1.5"/>
  <text x="270" y="183" text-anchor="middle" font-size="12" font-weight="bold" fill="white">API</text>
  <text x="270" y="199" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Gateway</text>
  <text x="270" y="215" text-anchor="middle" font-size="10" fill="#A9DFBF">Auth / Rate-limit</text>

  <!-- Arrow API Gateway → NLU -->
  <line x1="330" y1="190" x2="375" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- NLU Engine -->
  <rect x="380" y="120" width="130" height="60" rx="8" fill="#7D6608" stroke="#6E5E08" stroke-width="1.5"/>
  <text x="445" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="white">NLU Engine</text>
  <text x="445" y="163" text-anchor="middle" font-size="10" fill="#F9E79F">Intent + Entities</text>

  <!-- Arrow NLU → DM -->
  <line x1="510" y1="150" x2="555" y2="150" stroke="#444" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Dialogue Manager -->
  <rect x="560" y="120" width="130" height="60" rx="8" fill="#922B21" stroke="#7B241C" stroke-width="1.5"/>
  <text x="625" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Dialogue</text>
  <text x="625" y="162" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Manager</text>

  <!-- Arrow DM → Response Generator -->
  <line x1="625" y1="180" x2="625" y2="225" stroke="#444" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Response Generator -->
  <rect x="560" y="230" width="130" height="60" rx="8" fill="#76448A" stroke="#6C3483" stroke-width="1.5"/>
  <text x="625" y="255" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Response</text>
  <text x="625" y="272" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Generator</text>

  <!-- Arrow Response Gen → API GW (return) -->
  <path d="M 560 270 Q 400 320 330 225" fill="none" stroke="#444" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="430" y="318" text-anchor="middle" font-size="9" fill="#444">structured response</text>

  <!-- Database -->
  <rect x="380" y="260" width="130" height="55" rx="8" fill="#1F618D" stroke="#154360" stroke-width="1.5"/>
  <text x="445" y="281" text-anchor="middle" font-size="11" font-weight="bold" fill="white">SQLite / DB</text>
  <text x="445" y="298" text-anchor="middle" font-size="10" fill="#AED6F1">Session History</text>
  <text x="445" y="311" text-anchor="middle" font-size="10" fill="#AED6F1">User Profiles</text>

  <!-- Arrows DM ↔ DB -->
  <line x1="590" y1="260" x2="510" y2="285" stroke="#1F618D" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <line x1="510" y1="275" x2="590" y2="250" stroke="#1F618D" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- External APIs box -->
  <rect x="560" y="340" width="200" height="65" rx="8" fill="#2C3E50" stroke="#1A252F" stroke-width="1.5"/>
  <text x="660" y="362" text-anchor="middle" font-size="11" font-weight="bold" fill="white">External APIs</text>
  <text x="660" y="379" text-anchor="middle" font-size="10" fill="#BDC3C7">Weather / Payment / CRM</text>
  <text x="660" y="394" text-anchor="middle" font-size="10" fill="#BDC3C7">Webhook Handlers</text>

  <!-- Arrow DM → External -->
  <line x1="625" y1="290" x2="660" y2="338" stroke="#2C3E50" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

  <!-- Caption -->
  <text x="400" y="422" text-anchor="middle" font-size="11" fill="#555">Solid lines = primary data flow; dashed = async/persistence. All components from Chapter 11 code samples.</text>
</svg>

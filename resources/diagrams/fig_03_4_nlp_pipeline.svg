<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <title>Figure 3.4 – NLP Processing Pipeline</title>
  <!-- Background -->
  <rect width="800" height="200" fill="#f8f9fa" rx="8"/>
  <text x="400" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a1a2e">Figure 3.4 – NLP Processing Pipeline</text>

  <!-- Stage boxes -->
  <!-- Raw Input -->
  <rect x="20" y="50" width="110" height="80" rx="8" fill="#1B4F72" stroke="#154360" stroke-width="1.5"/>
  <text x="75" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Raw</text>
  <text x="75" y="102" text-anchor="middle" font-size="12" fill="white" font-weight="bold">User Input</text>
  <text x="75" y="120" text-anchor="middle" font-size="10" fill="#AED6F1">"Book a flight"</text>

  <!-- Arrow -->
  <line x1="130" y1="90" x2="155" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tokenisation -->
  <rect x="158" y="50" width="110" height="80" rx="8" fill="#1A5276" stroke="#154360" stroke-width="1.5"/>
  <text x="213" y="85" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Tokenisation</text>
  <text x="213" y="105" text-anchor="middle" font-size="10" fill="#AED6F1">["Book","a","flight"]</text>

  <!-- Arrow -->
  <line x1="268" y1="90" x2="293" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Intent Detection -->
  <rect x="296" y="50" width="120" height="80" rx="8" fill="#1F618D" stroke="#154360" stroke-width="1.5"/>
  <text x="356" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Intent</text>
  <text x="356" y="98" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Detection</text>
  <text x="356" y="118" text-anchor="middle" font-size="10" fill="#AED6F1">book_flight (0.94)</text>

  <!-- Arrow -->
  <line x1="416" y1="90" x2="441" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Entity Extraction -->
  <rect x="444" y="50" width="120" height="80" rx="8" fill="#2471A3" stroke="#1A5276" stroke-width="1.5"/>
  <text x="504" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Entity</text>
  <text x="504" y="98" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Extraction</text>
  <text x="504" y="118" text-anchor="middle" font-size="10" fill="#AED6F1">dest=flight</text>

  <!-- Arrow -->
  <line x1="564" y1="90" x2="589" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Dialogue Manager -->
  <rect x="592" y="50" width="120" height="80" rx="8" fill="#2980B9" stroke="#1A5276" stroke-width="1.5"/>
  <text x="652" y="82" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Dialogue</text>
  <text x="652" y="98" text-anchor="middle" font-size="12" fill="white" font-weight="bold">Manager</text>
  <text x="652" y="118" text-anchor="middle" font-size="10" fill="#AED6F1">Slot-filling FSM</text>

  <!-- Arrow -->
  <line x1="712" y1="90" x2="737" y2="90" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Response -->
  <rect x="740" y="50" width="48" height="80" rx="8" fill="#5DADE2" stroke="#2980B9" stroke-width="1.5"/>
  <text x="764" y="82" text-anchor="middle" font-size="11" fill="white" font-weight="bold">Re-</text>
  <text x="764" y="97" text-anchor="middle" font-size="11" fill="white" font-weight="bold">spon</text>
  <text x="764" y="112" text-anchor="middle" font-size="11" fill="white" font-weight="bold">se</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="400" y="185" text-anchor="middle" font-size="11" fill="#555">Each stage transforms the user's raw text into a structured response. Arrows show data flow.</text>
</svg>
